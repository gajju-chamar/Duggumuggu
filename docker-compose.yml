version: '3.8'

services:
  vc_bot:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 512M
    volumes:
      - ./bot:/app/bot

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  redis_data: